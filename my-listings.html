<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homiefy | My Listings</title>
    <!-- Import Inter Font for modern Neative aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar reveal">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><ion-icon name="home"></ion-icon></div>
                <span>Homiefy</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Listings</a>
                <a href="my-listings.html" class="active">My Listings</a>
                <a href="favorites.html">Favorites</a>
                <a href="messages.html">Messages</a>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-switch" aria-label="Toggle Theme">
                    <ion-icon name="sunny" class="sun-icon"></ion-icon>
                    <ion-icon name="moon" class="moon-icon"></ion-icon>
                </button>
                <a href="profile.html" class="user-profile" style="text-decoration: none;">
                    <span>John Doe</span>
                    <img src="https://api.dicebear.com/7.x/notionists/svg?seed=John" alt="Avatar" class="avatar">
                </a>
                <a href="login.html" class="view-apps-btn" style="text-decoration: none;">
                    <ion-icon name="log-out-outline"></ion-icon>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="reveal delay-1">
            <div class="section-header">
                <h2>Manage Your Listings</h2>
                <div class="filter-chip" id="myListingsCount">0 active listings</div>
            </div>
            
            <div class="bento-grid grid-2-1">
                
                <!-- Listings Management -->
                <div class="bento-box bg-white border-radius-large" style="display: flex; flex-direction: column; gap: 1rem;" id="myListingsGrid">
                   <!-- Populated by app.js -->
                </div>

                <!-- Create New Listing Form -->
                <div class="bento-box bg-white border-radius-large">
                    <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem;">Create Listing</h3>
                    
                    <form id="createListingForm" style="display: flex; flex-direction: column; gap: 1.2rem;">
                        <input type="text" id="listTitle" placeholder="Title (e.g. Sunny Room)" required style="padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); font-size: 0.9rem; outline: none;">
                        <input type="number" id="listRent" placeholder="Monthly Rent (₺)" required style="padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); font-size: 0.9rem; outline: none;">
                        <input type="text" id="listCity" placeholder="City" required style="padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); font-size: 0.9rem; outline: none;">
                        <textarea id="listDesc" placeholder="Description" rows="3" required style="padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); font-size: 0.9rem; outline: none;"></textarea>
                        
                        <div style="margin-top: 0.5rem;">
                            <span style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Preferences (Check if allowed)</span>
                            <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem;"><input type="checkbox"> Smoking Allowed</label>
                            <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;"><input type="checkbox"> Pets Allowed</label>
                        </div>

                        <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%; justify-content: center; padding: 1rem;">
                            <span class="btn-text">Publish Listing <ion-icon name="cloud-upload-outline"></ion-icon></span>
                            <div class="wave-bg"></div>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
